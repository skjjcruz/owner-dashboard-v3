
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynasty HQ — Coming Soon</title>
  <meta name="description" content="Dynasty HQ — the ultimate dynasty fantasy football command center. Launching soon.">
  <meta name="theme-color" content="#0a0f2c">

  <!-- Open Graph / social previews -->
  <meta property="og:title" content="Dynasty HQ — Coming Soon">
  <meta property="og:description" content="The ultimate dynasty fantasy football command center. Launching soon.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="<https://dhqfootball.com>">
  <meta property="og:image" content="<https://dhqfootball.com/dhq-logo.png>">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon" href="icons/dhq-logo.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/dhq-logo.png">

  <link href="<https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Oswald:wght@300;400;600&display=swap>" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gold:       #F2C14E;
      --gold-rich:  #D4AF37;
      --gold-deep:  #8A6A12;
      --navy-deep:  #05081a;
      --navy:       #0a0f2c;
      --navy-soft:  #141b45;
      --white:      #ffffff;
      --muted:      rgba(255, 255, 255, 0.65);
    }

    html, body {
      height: 100%;
      background: var(--navy-deep);
      color: var(--white);
      font-family: 'Oswald', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Starfield backdrop ─────────────────────────────────── */
    .backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(242, 193, 78, 0.14) 0%, transparent 55%),
        radial-gradient(ellipse at 50% 70%, rgba(20, 27, 69, 0.9) 0%, transparent 70%),
        linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
    }
    .stars, .stars-2, .stars-3 {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-repeat: repeat;
    }
    .stars {
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1.5px 1.5px at 40% 70%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 65% 55%, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 10% 85%, rgba(255,255,255,0.85), transparent),
        radial-gradient(1.5px 1.5px at 90% 80%, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 55% 20%, rgba(255,255,255,0.7), transparent);
      background-size: 100% 100%;
      animation: drift 120s linear infinite;
    }
    .stars-2 {
      background-image:
        radial-gradient(1px 1px at 15% 55%, rgba(242,193,78,0.55), transparent),
        radial-gradient(1px 1px at 75% 35%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 30% 15%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 85% 65%, rgba(242,193,78,0.45), transparent);
      background-size: 100% 100%;
      opacity: 0.7;
      animation: drift 200s linear infinite reverse;
    }
    .stars-3 {
      background-image:
        radial-gradient(2px 2px at 25% 40%, rgba(255,255,255,0.95), transparent 60%),
        radial-gradient(2px 2px at 70% 80%, rgba(242,193,78,0.8), transparent 60%),
        radial-gradient(2px 2px at 50% 10%, rgba(255,255,255,0.9), transparent 60%);
      background-size: 100% 100%;
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    @keyframes drift {
      from { transform: translateY(0); }
      to   { transform: translateY(-200px); }
    }
    @keyframes twinkle {
      from { opacity: 0.3; }
      to   { opacity: 0.9; }
    }

    /* ── Main layout ────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      text-align: center;
    }

    .logo-wrap {
      position: relative;
      margin-bottom: 2.5rem;
      animation: fadeDown 1.2s ease-out both;
    }
    .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -40px;
      background: radial-gradient(circle at center, rgba(242,193,78,0.35) 0%, transparent 60%);
      filter: blur(20px);
      z-index: -1;
      animation: pulse 4s ease-in-out infinite;
    }
    .logo {
      width: clamp(220px, 38vw, 380px);
      height: auto;
      display: block;
      filter: drop-shadow(0 10px 30px rgba(0,0,0,0.6));
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50%      { opacity: 0.9; transform: scale(1.05); }
    }

    .brand {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: clamp(2.6rem, 7vw, 4.6rem);
      letter-spacing: 0.08em;
      background: linear-gradient(180deg, #ffe89a 0%, var(--gold) 45%, var(--gold-rich) 70%, var(--gold-deep) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      margin-bottom: 0.35rem;
      animation: fadeUp 1.2s 0.2s ease-out both;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.9rem;
      margin: 0.9rem 0 1.5rem;
      animation: fadeUp 1.2s 0.35s ease-out both;
    }
    .divider .line {
      width: clamp(40px, 10vw, 90px);
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .divider .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px var(--gold);
    }

    .status {
      display: inline-block;
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: clamp(0.85rem, 2vw, 1rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      padding: 0.55rem 1.4rem;
      border: 1px solid rgba(242,193,78,0.55);
      border-radius: 999px;
      background: rgba(242,193,78,0.06);
      animation: fadeUp 1.2s 0.5s ease-out both;
    }

    .tagline {
      max-width: 620px;
      margin: 2rem auto 0;
      font-weight: 300;
      font-size: clamp(1rem, 2.4vw, 1.2rem);
      line-height: 1.6;
      color: var(--muted);
      animation: fadeUp 1.2s 0.65s ease-out both;
    }

    .cta-row {
      margin-top: 2.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      animation: fadeUp 1.2s 0.8s ease-out both;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.85rem 1.7rem;
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--navy-deep);
      background: linear-gradient(180deg, #ffe89a 0%, var(--gold) 55%, var(--gold-rich) 100%);
      border: 1px solid var(--gold-rich);
      border-radius: 999px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      box-shadow: 0 6px 20px rgba(242,193,78,0.25);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(242,193,78,0.35);
      filter: brightness(1.05);
    }
    .btn.ghost {
      background: transparent;
      color: var(--gold);
      border: 1px solid rgba(242,193,78,0.55);
      box-shadow: none;
    }
    .btn.ghost:hover {
      background: rgba(242,193,78,0.08);
      box-shadow: 0 0 20px rgba(242,193,78,0.18);
    }

    footer {
      position: relative;
      z-index: 2;
      padding: 2rem 1.5rem 2.5rem;
      text-align: center;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    footer .sep { color: rgba(242,193,78,0.35); margin: 0 0.6rem; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .stars, .stars-2, .stars-3, .logo-wrap::before { animation: none; }
      .brand, .status, .tagline, .cta-row, .divider, .logo-wrap { animation: none; }
    }
  </style>
</head>
<body>
  <div class="backdrop"></div>
  <div class="stars"></div>
  <div class="stars-2"></div>
  <div class="stars-3"></div>

  <main class="page">
    <div class="logo-wrap">
      <img src="icons/dhq-logo.png" alt="Dynasty HQ logo" class="logo">
    </div>

    <h1 class="brand">DYNASTY&nbsp;HQ</h1>

    <div class="divider" aria-hidden="true">
      <span class="line"></span>
      <span class="dot"></span>
      <span class="line"></span>
    </div>

    <span class="status">Coming Soon</span>

    <p class="tagline">
      The ultimate command center for dynasty fantasy football owners.
      Rosters, trades, draft war rooms, and free agency &mdash; all in one place.
    </p>

    <div class="cta-row">
      <a class="btn" href="mailto:hello@dhqfootball.com?subject=Notify%20me%20when%20Dynasty%20HQ%20launches">Get Notified</a>
    </div>
  </main>

  <footer>
    <span>&copy; <span id="yr"></span> Dynasty HQ</span>
    <span class="sep">&bull;</span>
    <span><dhqfootball.com></span>
  </footer>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
  </script>
</body>
</html>
